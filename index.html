<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SovaApp</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #0a0a0a; color: #e0e0e0; height: 100vh; overflow: hidden; }
        .app { display: flex; height: 100%; width: 100%; position: relative; }
        .chats-panel { width: 30%; max-width: 320px; background: #111; border-right: 1px solid #2a2a2a; display: flex; flex-direction: column; transition: transform 0.3s ease; }
        .chat-header { padding: 16px; background: #0f0f0f; border-bottom: 1px solid #2a2a2a; display: flex; justify-content: space-between; align-items: center; font-weight: 600; font-size: 20px; }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid #1f1f1f; cursor: pointer; transition: background 0.2s; }
        .chat-item.active { background: #1e2a2e; }
        .chat-avatar { width: 48px; height: 48px; background: #2c3e2f; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 12px; overflow: hidden; flex-shrink: 0; }
        .chat-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .chat-info { flex:1; min-width: 0; }
        .chat-name { font-weight: 500; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-preview { font-size: 13px; color: #8e8e8e; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .messages-panel { flex:1; display: flex; flex-direction: column; background: #0c0c0c; }
        .messages-header { padding: 16px; background: #0f0f0f; border-bottom: 1px solid #2a2a2a; display: flex; align-items: center; gap: 12px; }
        .back-button { display: none; background: none; border: none; font-size: 24px; color: #e0e0e0; cursor: pointer; }
        .profile-btn { margin-left: auto; background: none; border: none; color: #e0e0e0; font-size: 20px; cursor: pointer; }
        .messages-container { flex:1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
        .message { max-width: 75%; padding: 8px 12px; border-radius: 18px; word-wrap: break-word; font-size: 15px; line-height: 1.4; }
        .message-out { background: #2b5278; align-self: flex-end; border-bottom-right-radius: 4px; }
        .message-in { background: #2a2a2a; align-self: flex-start; border-bottom-left-radius: 4px; }
        .message-time { font-size: 10px; color: #aaa; margin-top: 4px; text-align: right; }
        .input-area { padding: 12px 16px; background: #111; border-top: 1px solid #2a2a2a; display: flex; gap: 8px; }
        .message-input { flex:1; background:#1f1f1f; border:none; border-radius:24px; padding:10px 16px; color:#e0e0e0; font-size:16px; outline:none; }
        .send-button { background:#2b5278; border:none; border-radius:24px; padding:0 20px; color:white; font-weight:600; cursor:pointer; }
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index:1000; }
        .modal-content { background: #1e1e1e; border-radius: 28px; padding: 24px; width: 90%; max-width: 400px; }
        .modal-content h2 { margin-bottom: 20px; text-align: center; }
        .modal-content input, .modal-content button { width:100%; margin-top:12px; padding:12px; border-radius:12px; border:none; font-size:16px; }
        .modal-content input { background:#2a2a2a; color:white; }
        .modal-content button { background:#2b5278; color:white; font-weight:bold; cursor:pointer; }
        .modal-content button.secondary { background:#444; }
        .avatar-preview { width:100px; height:100px; border-radius:50%; margin:0 auto 16px; background:#333; display:flex; align-items:center; justify-content:center; overflow:hidden; }
        .avatar-preview img { width:100%; height:100%; object-fit:cover; }
        @media (max-width: 640px) {
            .chats-panel { position: absolute; left:0; top:0; height:100%; z-index:10; width:80%; transform:translateX(-100%); }
            .chats-panel.open { transform:translateX(0); box-shadow:2px 0 12px rgba(0,0,0,0.5); }
            .back-button { display: block; }
        }
        .loading { position: fixed; top:50%; left:50%; transform:translate(-50%,-50%); color:white; font-size:18px; z-index:2000; display:none; }
    </style>
</head>
<body>
<div id="loadingOverlay" class="loading">Загрузка...</div>
<div class="app" id="app" style="display:none">
    <div class="chats-panel" id="chatsPanel">
        <div class="chat-header"><span>🦉 SovaApp</span><button id="profileBtnHeader" style="background:none;border:none;color:white;font-size:18px;cursor:pointer;">👤</button></div>
        <div class="chat-list" id="chatList"><div style="padding:20px;text-align:center;color:#888;">Загрузка...</div></div>
    </div>
    <div class="messages-panel">
        <div class="messages-header"><button class="back-button" id="backButton">←</button><span class="chat-name" id="currentChatName">Выберите чат</span><button class="profile-btn" id="profileBtnMsg">👤</button></div>
        <div class="messages-container" id="messagesContainer"><div style="text-align:center;color:#888;margin-top:40px;">Выберите чат слева</div></div>
        <div class="input-area"><input type="text" class="message-input" id="messageInput" placeholder="Сообщение" autocomplete="off"><button class="send-button" id="sendButton">→</button></div>
    </div>
</div>
<div id="authModal" class="modal"><div class="modal-content"><h2>🦉 SovaApp</h2><input type="email" id="loginEmail" placeholder="Email"><input type="password" id="loginPassword" placeholder="Пароль"><button id="loginBtn">Войти</button><button id="showRegisterBtn" class="secondary">Создать аккаунт</button></div></div>
<div id="registerModal" class="modal" style="display:none"><div class="modal-content"><h2>Регистрация</h2><input type="email" id="regEmail" placeholder="Email"><input type="password" id="regPassword" placeholder="Пароль"><input type="text" id="regName" placeholder="Имя"><input type="text" id="regSurname" placeholder="Фамилия"><button id="registerBtn">Зарегистрироваться</button><button id="backToLoginBtn" class="secondary">Назад</button></div></div>
<div id="profileModal" class="modal" style="display:none"><div class="modal-content"><h2>Профиль</h2><div class="avatar-preview" id="profileAvatarPreview"><img id="profileAvatarImg" src=""></div><input type="file" id="avatarUpload" accept="image/jpeg,image/png,image/webp"><input type="text" id="profileName" placeholder="Имя"><input type="text" id="profileSurname" placeholder="Фамилия"><button id="saveProfileBtn">Сохранить</button><button id="logoutBtn" class="secondary" style="background:#aa2e2e;">Выйти</button><button id="closeProfileBtn" class="secondary">Закрыть</button></div></div>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAhrtdIVkz97QakuqwD8apHAuthDomain: \"sovaapp1.firebaseapp.com\",", // исправлено
        authDomain: "sovaapp1.firebaseapp.com",
        databaseURL: "https://sovaapp1-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "sovaapp1",
        storageBucket: "sovaapp1.firebasestorage.app",
        messagingSenderId: "321009017223",
        appId: "1:321009017223:web:7bb79330fcfc9a7b83b94b",
        measurementId: "G-8JPHEP1LXT"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const storage = firebase.storage();
    const serverTimestamp = firebase.firestore.FieldValue.serverTimestamp;

    let currentUser = null, currentChatUserId = null, currentChatUserName = "", unsubscribeMessages = null;
    const appDiv = document.getElementById('app'), authModal = document.getElementById('authModal'), registerModal = document.getElementById('registerModal'), profileModal = document.getElementById('profileModal'), loadingOverlay = document.getElementById('loadingOverlay');
    function showModal(m) { m.style.display = 'flex'; }
    function hideModal(m) { m.style.display = 'none'; }
    function setLoading(s) { loadingOverlay.style.display = s ? 'flex' : 'none'; }
    function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
    function formatTime(ts) { if(!ts) return ''; const d = ts.toDate ? ts.toDate() : new Date(ts); return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }
    async function loadProfileData() { if(!currentUser) return; const doc = await db.collection('users').doc(currentUser.uid).get(); if(doc.exists) { const d=doc.data(); document.getElementById('profileName').value=d.name||''; document.getElementById('profileSurname').value=d.surname||''; const img=document.getElementById('profileAvatarImg'); img.src=d.avatarUrl||''; } }
    async function updateProfile(name,surname,avatarFile) { if(!currentUser) return; setLoading(true); try { let avatarUrl=null; if(avatarFile){ const ext=avatarFile.name.split('.').pop(); const ref=storage.ref(`avatars/${currentUser.uid}.${ext}`); await ref.put(avatarFile); avatarUrl=await ref.getDownloadURL(); } const updateData={name,surname}; if(avatarUrl) updateData.avatarUrl=avatarUrl; await db.collection('users').doc(currentUser.uid).set(updateData,{merge:true}); if(currentChatUserId){ const oppDoc=await db.collection('users').doc(currentChatUserId).get(); if(oppDoc.exists){ const oppData=oppDoc.data(); currentChatUserName=`${oppData.name||''} ${oppData.surname||''}`.trim()||"Пользователь"; document.getElementById('currentChatName').innerText=currentChatUserName; } } renderChatList(); } catch(err){ alert("Ошибка: "+err.message); } finally{ setLoading(false); } }
    async function getOtherUsers() { const snap=await db.collection('users').get(); const users=[]; snap.forEach(doc=>{ if(doc.id!==currentUser.uid) users.push({id:doc.id,...doc.data()}); }); return users; }
    async function renderChatList() { const container=document.getElementById('chatList'); if(!container) return; setLoading(true); try { const users=await getOtherUsers(); if(users.length===0){ container.innerHTML='<div style="padding:20px;text-align:center;color:#888;">Нет других пользователей</div>'; return; } const chatsData=[]; for(const user of users){ const chatId=getChatId(currentUser.uid,user.id); const lastMsgQuery=await db.collection('messages').where('chatId','==',chatId).orderBy('timestamp','desc').limit(1).get(); let lastMsg=''; if(!lastMsgQuery.empty) lastMsg=lastMsgQuery.docs[0].data().text||''; chatsData.push({user,lastMsg}); } chatsData.sort((a,b)=>0); container.innerHTML=''; for(const item of chatsData){ const user=item.user; const lastMsg=item.lastMsg; const fullName=`${user.name||''} ${user.surname||''}`.trim()||"Пользователь"; const avatarHtml=user.avatarUrl?`<img src="${escapeHtml(user.avatarUrl)}">`:(fullName.charAt(0)||'?'); const div=document.createElement('div'); div.className=`chat-item ${currentChatUserId===user.id?'active':''}`; div.innerHTML=`<div class="chat-avatar">${typeof avatarHtml==='string'&&avatarHtml.startsWith('<img')?avatarHtml:`<span>${escapeHtml(avatarHtml)}</span>`}</div><div class="chat-info"><div class="chat-name">${escapeHtml(fullName)}</div><div class="chat-preview">${escapeHtml(lastMsg.substring(0,40))}</div></div>`; div.addEventListener('click',()=>openChat(user.id,fullName)); container.appendChild(div); } } catch(err){ console.error(err); container.innerHTML='<div style="padding:20px;text-align:center;color:#888;">Ошибка загрузки</div>'; } finally{ setLoading(false); } }
    function getChatId(uid1,uid2){ return uid1<uid2?uid1+'_'+uid2:uid2+'_'+uid1; }
    function openChat(opponentId,opponentName){ if(currentChatUserId===opponentId) return; if(unsubscribeMessages) unsubscribeMessages(); currentChatUserId=opponentId; currentChatUserName=opponentName; document.getElementById('currentChatName').innerText=opponentName; renderChatList(); loadMessages(opponentId); if(window.innerWidth<=640) document.getElementById('chatsPanel').classList.remove('open'); }
    function loadMessages(opponentId){ const chatId=getChatId(currentUser.uid,opponentId); const container=document.getElementById('messagesContainer'); container.innerHTML='<div style="text-align:center;color:#888;margin-top:40px;">Загрузка сообщений...</div>'; unsubscribeMessages=db.collection('messages').where('chatId','==',chatId).orderBy('timestamp','asc').onSnapshot(snapshot=>{ if(!container) return; container.innerHTML=''; if(snapshot.empty){ container.innerHTML='<div style="text-align:center;color:#888;margin-top:40px;">Нет сообщений. Напишите первое!</div>'; return; } snapshot.forEach(doc=>{ const data=doc.data(); const isOut=data.senderId===currentUser.uid; const msgDiv=document.createElement('div'); msgDiv.className=`message ${isOut?'message-out':'message-in'}`; msgDiv.innerHTML=`<div>${escapeHtml(data.text)}</div><div class="message-time">${formatTime(data.timestamp)}</div>`; container.appendChild(msgDiv); }); container.scrollTop=container.scrollHeight; }, error=>{ console.error(error); container.innerHTML='<div style="text-align:center;color:#888;">Ошибка загрузки сообщений</div>'; }); }
    async function sendMessage(){ if(!currentChatUserId){ alert("Выберите чат"); return; } const input=document.getElementById('messageInput'); const text=input.value.trim(); if(!text) return; input.value=''; const chatId=getChatId(currentUser.uid,currentChatUserId); try{ await db.collection('messages').add({chatId,senderId:currentUser.uid,receiverId:currentChatUserId,text,timestamp:serverTimestamp()}); renderChatList(); } catch(err){ alert("Ошибка отправки: "+err.message); } }
    document.getElementById('showRegisterBtn').onclick=()=>{ hideModal(authModal); showModal(registerModal); };
    document.getElementById('backToLoginBtn').onclick=()=>{ hideModal(registerModal); showModal(authModal); };
    document.getElementById('registerBtn').onclick=async()=>{ const email=document.getElementById('regEmail').value.trim(); const password=document.getElementById('regPassword').value; const name=document.getElementById('regName').value.trim(); const surname=document.getElementById('regSurname').value.trim(); if(!email||!password||!name){ alert("Заполните email, пароль и имя"); return; } setLoading(true); try{ const cred=await auth.createUserWithEmailAndPassword(email,password); await db.collection('users').doc(cred.user.uid).set({name,surname:surname||'',email,avatarUrl:null,createdAt:serverTimestamp()}); alert("Регистрация успешна! Теперь войдите."); hideModal(registerModal); showModal(authModal); document.getElementById('regEmail').value=''; document.getElementById('regPassword').value=''; document.getElementById('regName').value=''; document.getElementById('regSurname').value=''; } catch(err){ alert("Ошибка: "+err.message); } finally{ setLoading(false); } };
    document.getElementById('loginBtn').onclick=async()=>{ const email=document.getElementById('loginEmail').value.trim(); const password=document.getElementById('loginPassword').value; if(!email||!password){ alert("Введите email и пароль"); return; } setLoading(true); try{ await auth.signInWithEmailAndPassword(email,password); } catch(err){ alert("Ошибка входа: "+err.message); } finally{ setLoading(false); } };
    document.getElementById('logoutBtn').onclick=async()=>{ await auth.signOut(); location.reload(); };
    document.getElementById('saveProfileBtn').onclick=async()=>{ const name=document.getElementById('profileName').value.trim(); const surname=document.getElementById('profileSurname').value.trim(); const avatarFile=document.getElementById('avatarUpload').files[0]; await updateProfile(name,surname,avatarFile); hideModal(profileModal); };
    document.getElementById('closeProfileBtn').onclick=()=>hideModal(profileModal);
    document.getElementById('profileBtnHeader').onclick=async()=>{ await loadProfileData(); showModal(profileModal); };
    document.getElementById('profileBtnMsg').onclick=async()=>{ await loadProfileData(); showModal(profileModal); };
    document.getElementById('sendButton').addEventListener('click',sendMessage);
    document.getElementById('messageInput').addEventListener('keypress',(e)=>{ if(e.key==='Enter') sendMessage(); });
    document.getElementById('backButton').addEventListener('click',()=>document.getElementById('chatsPanel').classList.toggle('open'));
    document.querySelector('.messages-panel').addEventListener('click',(e)=>{ if(window.innerWidth<=640&&document.getElementById('chatsPanel').classList.contains('open')&&!e.target.closest('.chats-panel')) document.getElementById('chatsPanel').classList.remove('open'); });
    auth.onAuthStateChanged(async(user)=>{ if(user){ currentUser=user; const userDoc=await db.collection('users').doc(user.uid).get(); if(!userDoc.exists){ await db.collection('users').doc(user.uid).set({name:user.displayName||'',surname:'',email:user.email,avatarUrl:null,createdAt:serverTimestamp()}); } hideModal(authModal); hideModal(registerModal); appDiv.style.display='flex'; renderChatList(); } else { currentUser=null; currentChatUserId=null; if(unsubscribeMessages) unsubscribeMessages(); appDiv.style.display='none'; showModal(authModal); document.getElementById('loginEmail').value=''; document.getElementById('loginPassword').value=''; } });
    if('serviceWorker' in navigator){ const swCode=`self.addEventListener('install',e=>self.skipWaiting()); self.addEventListener('fetch',e=>e.respondWith(fetch(e.request).catch(()=>new Response('Offline',{status:503}))));`; const blob=new Blob([swCode],{type:'application/javascript'}); navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(e=>console.log); }
    const manifest={name:"SovaApp",short_name:"SovaApp",start_url:".",display:"standalone",theme_color:"#0a0a0a",background_color:"#0a0a0a",icons:[]}; const manifestBlob=new Blob([JSON.stringify(manifest)],{type:'application/json'}); const manifestLink=document.getElementById('manifest-placeholder'); if(manifestLink) manifestLink.setAttribute('href',URL.createObjectURL(manifestBlob));
</script>
</body>
</html>
